services:
  db:
    image: postgres:16-alpine
    container_name: habittracker-db
    environment:
      POSTGRES_DB: habittracker
      POSTGRES_USER: habittracker
      POSTGRES_PASSWORD: habittracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habittracker -d habittracker"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: habittracker-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://habittracker:habittracker@db:5432/habittracker
      BETTER_AUTH_SECRET: change-me-to-a-long-random-secret
      BETTER_AUTH_URL: http://localhost:3000
      CLIENT_ORIGIN: http://localhost:5173
      REMINDER_SCHEDULER_ENABLED: "true"
      REMINDER_TARGET_HOUR: "22"
      REMINDER_CHECK_INTERVAL_MS: "60000"
      REMINDER_CLAIM_TIMEOUT_MS: "1800000"
      REMINDER_DEFAULT_TIMEZONE: UTC
      REMINDER_MAIL_PROVIDER: gmail
      REMINDER_FROM_EMAIL: your-gmail@gmail.com
      REMINDER_GMAIL_USER: your-gmail@gmail.com
      REMINDER_GMAIL_APP_PASSWORD: ""
      REMINDER_SMTP_HOST: ""
      REMINDER_SMTP_PORT: "587"
      REMINDER_SMTP_SECURE: "false"
      REMINDER_SMTP_USER: ""
      REMINDER_SMTP_PASS: ""
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: habittracker-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules: